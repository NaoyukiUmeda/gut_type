# Cloudflare Pages（@cloudflare/next-on-pages ビルド）用の設定。
# Pages プロジェクトを新規作成し、このプロジェクト名と name を一致させること。
name = "gutype"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# next-on-pages の出力ディレクトリ
pages_build_output_dir = ".vercel/output/static"

# 3日間配信(/api/steps/run)の定期実行は外部cronサービスから叩く方式。
# Cloudflare Pages Functions はスケジュール実行(cron)に非対応のため、
# wrangler.toml の [triggers] / functions/_scheduled.ts は使用しない。
